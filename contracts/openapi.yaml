# ClimaSense — cross-tier wire format (Slice 11 surface).
#
# This file is the source of truth for the .NET ↔ Python contract.
# Slice 2 introduced the ML-tier request/response surface (forecast /
# anomalies / profiles / comfort) as 501-stubs; slice 3 added the
# first read-path endpoint on the .NET tier — `GET /api/readings/latest`.
# Slice 4 (#6) extended that read-path with `GET /api/readings/range`
# and `GET /api/readings/heatmap`. Slice 5 (#7) flips the two
# `/api/forecast` operations from 501-stubs to REAL ml-tier handlers
# (lag-LR boot-fit + emission) and adds a web-tier `GET
# /api/forecasts/latest` read that hits `dbo.fv_forecasts_at_cursor`
# directly so the Explorer overlay never crosses to the ml container.
# Slice 6 (#8) adds the leaderboard surface: the ml tier's
# `LeaderboardSeeder` MERGEs the notebook rows from `assets/results.json`
# at startup and one live row from the boot-fitted forecaster's eval on
# the same 14-day held-out window; the web tier serves the rows via
# `GET /api/leaderboard` (read-path bypass) and renders them on the
# Razor `Analysis` page with the live row visually badged.
# Slice 7 (#9) promotes `/api/comfort/score` from 501-stub to a real
# ml-tier handler: a pure `ComfortCalculator` (ASHRAE 55-2020 graphical
# zone polygons) scores the trailing-window mean (T, RH) and MERGEs a
# row into `dbo.ComfortScores` (idempotent on `BucketTime`). An
# APScheduler β-prime gate (slice-5 pattern) emits one row per
# replay-hour. The dashboard's comfort card reads through a new
# web-tier-only `/api/comfort/current` (the `dbo.fv_comfortscores_at_cursor`
# TVF — read-path bypass).
# Slice 8 (#10) promotes `/api/anomalies/detect` from 501-stub to a real
# ml-tier handler. Three concrete detector modules run in sequence
# (`SensorFailureRules`, `ResidualOutlierDetector`,
# `ChangepointDetector`) with per-type idempotency. The web tier
# surfaces two new read endpoints — `/api/anomalies/latest` and
# `/api/anomalies` (range + type filter) — both reading SQL Server
# directly through `dbo.fv_anomalies_at_cursor(@asOf)`. The dashboard
# gains a "Last anomaly" card; `POST /api/ml/run/anomalies` proxies
# the on-demand button.
# Slice 9 (#11) promotes `/api/profiles/analyze` from 501-stub to a
# real ml-tier handler. Concrete `ProfileComputer` runs the lag-LR
# in-sample residual + calendar-cohort z-score pipeline; the SQL
# `dbo.fn_classify_pattern` CASE function (init-db.sql §4) labels
# the `Pattern` from empirical p90/p25/p75 thresholds derived by
# `scripts/derive_pattern_thresholds.py`. The web tier adds
# `/api/profiles` (range read of `dbo.DayProfiles` via the cursor-
# clipped TVF); `POST /api/ml/run/profiles` proxies the on-demand
# button.
# Slice 10 (#12) adds the Comfort Budget panel. One new web-tier-only
# endpoint — `GET /api/comfort/budget` — surfaces three deterministic
# SQL aggregations over `dbo.ComfortScores` + `dbo.DayProfiles`:
# hours-outside-zone (last 7 days), worst calendar cell, and a
# 7-day daily-trend sparkline. Both threshold (default 70) and window
# (default 7 days) are configurable via `COMFORT_DISCOMFORT_THRESHOLD`
# and `COMFORT_BUDGET_WINDOW_DAYS`. The dashboard panel hydrates from
# this single endpoint; the ml container is NOT involved. See
# ADR-0006.
# Slice 11 (#13) adds the threshold alert engine, Alert history page,
# and `breach-detected` SSE event. Two new web-tier-only endpoints —
# `GET /api/alerts` (history) and `GET /api/alerts/rules` (rules in
# force) — back the page; a new `BackgroundService`
# (`ThresholdAlertScanner`) inside the .NET web tier fires every
# wall-minute, runs per-rule gaps-and-islands SQL over the last 24 h
# of `dbo.SensorReadings`, and writes one `dbo.Alerts` row per
# newly-closed breach interval (idempotent via UNIQUE(RuleId,
# BreachStart)). Every insertion broadcasts a `breach-detected`
# event on the slice-1 `AlertStream`. Rules are seeded in
# `scripts/init-db.sql §5`; CRUD UI is deferred per ADR-0011.
#
# Camel-case JSON only. The .NET tier configures System.Text.Json with
# JsonNamingPolicy.CamelCase; FastAPI relies on Pydantic field aliases
# emitted by `datamodel-code-generator` via the `--snake-case-field`
# + alias-generator combination configured at codegen time.

openapi: 3.0.3
info:
  title: ClimaSense Platform API
  version: 0.11.0-slice-11
  description: |
    Cross-tier contract for ClimaSense. The web tier (ASP.NET Core) and
    the ML tier (FastAPI) both honour this document. Each tier MUST mint
    or accept an `X-Request-ID` header on every request and propagate it
    via structured-log scope.

    ## Failure mapping (web → ml)

    The .NET tier's `MLServiceClient` consumes this contract through a
    Kiota-generated client wrapped in a `DelegatingHandler` that maps
    Python-side failure modes onto canonical HTTP semantics seen by the
    browser:

      * connection-refused / DNS failure        → `503 ml_service_unavailable`
      * upstream 5xx (Python tier returned 5xx) → `502 ml_service_error`
      * client timeout (30 s default, 60 s for changepoint)
                                                → `504 ml_service_timeout`

    No automatic retries. The browser sees actionable JSON; the Python
    traceback never leaves the ml container.

servers:
  - url: http://127.0.0.1:8080
    description: web tier (host-published, localhost-only)
  - url: http://ml:8000
    description: ml tier (network-internal; reachable from web only)

tags:
  - name: health
    description: Liveness and readiness probes.
  - name: readings
    description: |
      Raw `SensorReadings` reads. Served by the web tier directly from
      SQL — the read path bypasses the ml tier entirely (per ADR-0010 /
      PRD §"read-path bypass"). The contract entry exists so any client
      generated from this YAML can call the endpoint type-safely.
  - name: forecast
    description: Lag-LR forecast emission and read endpoints.
  - name: anomalies
    description: Sensor-failure / regime-shift / residual-outlier detection.
  - name: profiles
    description: Calendar-conditioned day-of-week × hour-of-day profiles.
  - name: comfort
    description: ASHRAE 55 graphical comfort zone scoring.
  - name: leaderboard
    description: |
      Heterogeneous model leaderboard: notebook rows seeded from
      `assets/results.json` plus one `provenance: live` row evaluated
      at FastAPI startup by the boot-fitted `LagLinearForecaster` on
      the same 14-day held-out window. Served by the web tier directly
      from SQL — the read path bypasses the ml tier.
  - name: alerts
    description: |
      Threshold alert rules and history. The threshold engine runs as a
      `BackgroundService` (`ThresholdAlertScanner`) inside the .NET web
      tier — wall-minute scan over `dbo.SensorReadings`, gaps-and-islands
      SQL per rule, closure-only delivery, idempotent re-detection via
      `UNIQUE(RuleId, BreachStart)`. AlertRules CRUD UI is deferred
      (rules seeded in `scripts/init-db.sql`).
  - name: sse
    description: Server-Sent Events channel (web tier only).

paths:
  # -------------------------------------------------------------------
  # Health — present on BOTH tiers. The contract documents the ml-tier
  # surface; the web tier mirrors the same schema (see Program.cs).
  # -------------------------------------------------------------------
  /api/health/live:
    get:
      summary: Liveness probe
      description: Returns immediately with no dependency checks. The process is up.
      operationId: getHealthLive
      tags: [health]
      responses:
        "200":
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /api/health/ready:
    get:
      summary: Readiness probe
      description: |
        Returns 200 only when all critical dependencies are reachable
        (database connectivity at minimum). Returns 503 during startup
        or whenever a dependency is unreachable.
      operationId: getHealthReady
      tags: [health]
      responses:
        "200":
          description: Service is ready to accept traffic.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: A dependency is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /api/health:
    get:
      summary: Combined health probe (legacy slice-2 alias)
      description: |
        Combined health alias. Returns the same body shape as `/api/health/ready`
        but never returns 503 — degraded dependencies appear inside `checks`
        so callers that prefer a single endpoint can introspect.
      operationId: getHealth
      tags: [health]
      responses:
        "200":
          description: Combined health snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # -------------------------------------------------------------------
  # Forecast — lag-LR boot-fit. Slice 7 implements; slice 2 ships 501.
  # -------------------------------------------------------------------
  /api/forecast:
    get:
      summary: Read the most recently emitted forecast.
      description: |
        Returns the forecast row with the largest `generatedAt` that is
        less-than-or-equal-to the current cursor. Read-path; bypasses
        the ml tier in production (the .NET tier reads SQL directly).
        This contract entry exists so a future ml-internal call (e.g.
        `MLServiceClient.GetForecastAsync`) is type-safe end-to-end.
      operationId: getForecast
      tags: [forecast]
      parameters:
        - in: query
          name: horizonHours
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 168
            default: 72
          description: Forecast horizon in hours (1–168). Default 72.
      responses:
        "200":
          description: Forecast envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForecastEnvelope"
        "501":
          description: Stubbed in slice 2; implemented in slice 7.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

    post:
      summary: Emit a forecast at the current cursor.
      description: |
        Triggers the lag-LR forecaster to predict `horizonHours` ahead
        of the current cursor and append rows to `Forecasts`. The
        boot-fitted coefficients are loaded once at FastAPI startup;
        no per-request fit happens.
      operationId: postForecast
      tags: [forecast]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForecastRequest"
      responses:
        "200":
          description: Forecast emitted and persisted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForecastEnvelope"
        "501":
          description: Stubbed in slice 2; implemented in slice 7.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "502":
          description: ml tier returned 5xx — bubbled to the browser as bad-gateway.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: ml tier unreachable (connection refused / dns failure).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "504":
          description: ml tier exceeded the bounded timeout (30 s default).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  # -------------------------------------------------------------------
  # Forecasts read — web-tier read-path bypass for the Explorer overlay.
  # Slice 5: reads the most recent batch through
  # `dbo.fv_forecasts_at_cursor(@asOf)` (init-db.sql §3.1). Cursor-
  # clipping is a property of the schema; the .NET service queries the
  # TVF rather than the bare `Forecasts` table.
  # -------------------------------------------------------------------
  /api/forecasts/latest:
    get:
      summary: Return the most recent forecast batch visible at the cursor.
      description: |
        Returns the rows with the largest `generatedAt` value that is
        less-than-or-equal-to the current cursor. Reads SQL Server
        directly via the inline TVF `dbo.fv_forecasts_at_cursor(@asOf)`
        — the ml container is NOT involved. Empty `points` is a valid
        200 response (no forecast has been emitted at or before the
        cursor yet).
      operationId: getForecastsLatest
      tags: [forecast]
      responses:
        "200":
          description: Latest forecast envelope at the cursor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForecastEnvelope"

  # -------------------------------------------------------------------
  # Anomalies — three detectors, scan-window or scan-and-replace.
  # -------------------------------------------------------------------
  /api/anomalies/detect:
    post:
      summary: Run the anomaly detector pipeline.
      description: |
        Invokes the appropriate detector(s) against the cursor window.
        - `sensor_failure` / `residual_outlier` — INSERT … WHERE NOT EXISTS
          over a 24-hour lookback. Cheap; default timeout 30 s.
        - `regime_shift` — `sp_getapplock`-guarded scan-and-replace over
          a 90-day lookback. Longer; default timeout **60 s**.

        Idempotent per `UNIQUE (AnomalyType, ReadingTime)`. Slice 8
        promotes this handler from the slice-2 501-stub to the real
        three-detector pipeline.
      operationId: postAnomaliesDetect
      tags: [anomalies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnomalyDetectRequest"
      responses:
        "200":
          description: Detection complete.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnomalyDetectResponse"
        "503":
          description: Detector dependency missing (forecaster not boot-fitted yet).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  # -------------------------------------------------------------------
  # Anomalies — web-tier read surface. Slice 8 ships the "Last
  # anomaly" card on the dashboard plus a range/type-filter list
  # endpoint. Both read SQL Server directly through
  # `dbo.fv_anomalies_at_cursor(@asOf)` so the read path bypasses the
  # ml tier entirely.
  # -------------------------------------------------------------------
  /api/anomalies/latest:
    get:
      summary: Return the most recent anomaly visible at the cursor.
      description: |
        Returns the row from `dbo.Anomalies` with the largest
        `DetectedAt` that is less-than-or-equal-to the current cursor.
        Reads the inline TVF `dbo.fv_anomalies_at_cursor(@asOf)` —
        cursor-clipping is a property of the schema. Returns 404 when
        no anomaly is visible (typical before any detector has fired).
      operationId: getAnomaliesLatest
      tags: [anomalies]
      responses:
        "200":
          description: Latest anomaly at the cursor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LatestAnomalyResponse"
        "404":
          description: No anomaly rows visible at the cursor yet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/anomalies:
    get:
      summary: Range query over `dbo.Anomalies` with optional type filter.
      description: |
        Returns all anomalies in `[start, end]` visible at the cursor,
        ordered by `ReadingTime DESC`. `type` filters to a single
        `AnomalyType` when provided. Window is bounded server-side to
        90 days (the changepoint scan window). Web tier reads SQL
        Server directly through `dbo.fv_anomalies_at_cursor(@asOf)`.
      operationId: getAnomalies
      tags: [anomalies]
      parameters:
        - in: query
          name: start
          required: false
          schema:
            type: string
            format: date-time
          description: |
            Window start (inclusive, UTC). Defaults to `end - 24h`
            when omitted.
        - in: query
          name: end
          required: false
          schema:
            type: string
            format: date-time
          description: Window end (inclusive, UTC). Defaults to the cursor.
        - in: query
          name: type
          required: false
          schema:
            $ref: "#/components/schemas/AnomalyType"
          description: Filter to a single anomaly type. Omit for all three.
      responses:
        "200":
          description: Anomalies in the requested window.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnomaliesResponse"
        "400":
          description: Invalid query (e.g. `start > end` or unparseable date).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  # -------------------------------------------------------------------
  # Profiles — calendar-conditioned z-scores. Slice 9 promotes this
  # from the slice-2 501-stub to a real handler.
  # -------------------------------------------------------------------
  /api/profiles/analyze:
    post:
      summary: Recompute calendar-conditioned day profiles.
      description: |
        Recomputes `dbo.DayProfiles` rows over `[startDate, endDate]`
        using the empirical SQL CASE classifier
        `dbo.fn_classify_pattern` baked into `init-db.sql §4` (p90 of
        MaxAbsZscore, p25/p75 of MeanResidual derived by
        `scripts/derive_pattern_thresholds.py` over the full
        `sensor_data.csv` training window). Idempotent on
        `[startDate, endDate]` — re-running yields identical rows
        (compute is deterministic; MERGE keyed on Date; Pattern
        labels are SQL-side and deterministic).

        The compute walks the full hourly history (cohort μ/σ benefit
        from maximum information) but only the requested `[startDate,
        endDate]` rows are MERGEd and returned.
      operationId: postProfilesAnalyze
      tags: [profiles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfilesAnalyzeRequest"
      responses:
        "200":
          description: Profiles recomputed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfilesAnalyzeResponse"
        "400":
          description: |
            Invalid range — `startDate > endDate` or span exceeds the
            server-side cap (`MAX_RANGE_DAYS = 366`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: |
            The underlying `dbo.SensorReadings` had no rows to compute
            against (typically only during the brief bootstrap window).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  # -------------------------------------------------------------------
  # Profiles read — slice 9. Web-tier read-path bypass for the
  # dashboard / Explorer. Reads `dbo.DayProfiles` through
  # `dbo.fv_dayprofiles_at_cursor(@asOf)` (init-db.sql §3.3). The ml
  # container is NOT involved.
  # -------------------------------------------------------------------
  /api/profiles:
    get:
      summary: Range query over `dbo.DayProfiles` (cursor-clipped).
      description: |
        Returns all `dbo.DayProfiles` rows whose `Date` falls inside
        `[start, end]` and whose `ComputedAt` is at or before the
        cursor, ordered by `Date` ascending. Defaults: `end` → the
        cursor's calendar date; `start` → `end − 30 days`. The
        server caps the requested window to 366 days.

        Empty `rows` is a valid 200 response (the nightly recompute
        may not have populated the window yet; trigger via
        `POST /api/ml/run/profiles`).
      operationId: getProfiles
      tags: [profiles]
      parameters:
        - in: query
          name: start
          required: false
          schema:
            type: string
            format: date
          description: |
            Window start (inclusive, UTC date YYYY-MM-DD). Defaults
            to `end - 30 days` when omitted.
        - in: query
          name: end
          required: false
          schema:
            type: string
            format: date
          description: |
            Window end (inclusive, UTC date). Defaults to the
            cursor's calendar date when omitted.
      responses:
        "200":
          description: Profile rows in the requested window.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DayProfilesResponse"
        "400":
          description: Invalid range (start > end or span > 366 days, unparseable date).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  # -------------------------------------------------------------------
  # Comfort — ASHRAE 55 graphical zone scoring (slice 7).
  # -------------------------------------------------------------------
  /api/comfort/score:
    get:
      summary: Score the current cursor's comfort against ASHRAE 55.
      description: |
        Scores the average of the last `hours` of `SensorReadings`
        (clipped at cursor) against ASHRAE 55 summer/winter polygons
        selected by calendar month and `COMFORT_HEMISPHERE` env var.

        Side-effect: also `MERGE`s the resulting `(BucketTime, Score,
        Rating, Season)` into `dbo.ComfortScores`. Idempotent per
        `UNIQUE(BucketTime)` — re-running at the same cursor
        position produces zero net change because the calculator is
        pure.
      operationId: getComfortScore
      tags: [comfort]
      parameters:
        - in: query
          name: hours
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 168
            default: 24
          description: Trailing window in hours (1–168). Default 24.
      responses:
        "200":
          description: Comfort score envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComfortScoreResponse"
        "503":
          description: |
            The trailing window had no `SensorReadings` rows to score
            (`error: empty_window`). Typically only seen during the
            brief bootstrap window before `SensorReadings` is populated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  # -------------------------------------------------------------------
  # Comfort current — slice 7. Web-tier read-path bypass for the
  # dashboard card. Reads the most recent `ComfortScores` row through
  # `dbo.fv_comfortscores_at_cursor(@asOf)` (init-db.sql §3.4). The
  # ml container is NOT involved.
  # -------------------------------------------------------------------
  # -------------------------------------------------------------------
  # Comfort Budget — slice 10. Web-tier-only read combining three
  # deterministic SQL aggregations over `dbo.ComfortScores` +
  # `dbo.DayProfiles` (both cursor-clipped via TVFs). Replaces the
  # original "recommendations engine" per ADR-0006: auditable facts
  # rather than simulated tips. The ml container is NOT involved.
  # -------------------------------------------------------------------
  /api/comfort/budget:
    get:
      summary: Comfort Budget — three aggregations for the last N days.
      description: |
        Returns the three deterministic SQL aggregations that back the
        dashboard's Comfort Budget panel:

          1. `hoursOutsideZone` — `COUNT(*) FROM ComfortScores` in the
             window where `Score < threshold` (default threshold = 70
             from `COMFORT_DISCOMFORT_THRESHOLD`).
          2. `worstCell` — the `DayProfiles` row in the window with
             the most-negative `MeanResidual` (the "coldest cell").
             `null` when no day-profile row is visible at the cursor.
             Tie-breaker: most-recent date wins.
          3. `trend` — daily min/max/mean of `Score` for the window,
             via `DATE_BUCKET(DAY, 1, BucketTime)`. Empty days are
             omitted (the dashboard interpolates visually).

        Window: `[cursor - windowDays, cursor]` with both endpoints
        inclusive on the SQL side. `windowDays` defaults to 7
        (`COMFORT_BUDGET_WINDOW_DAYS`).

        Always returns 200; empty `dbo.ComfortScores` / `dbo.DayProfiles`
        produces `hoursOutsideZone: 0`, `worstCell: null`, `trend: []`.
        Read-path bypass — the ml container is NOT involved.
      operationId: getComfortBudget
      tags: [comfort]
      responses:
        "200":
          description: Comfort Budget envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComfortBudgetResponse"

  /api/comfort/current:
    get:
      summary: Return the most recent comfort score visible at the cursor.
      description: |
        Returns the `ComfortScores` row with the largest `BucketTime`
        that is less-than-or-equal-to the current cursor. Reads SQL
        Server directly via the inline TVF
        `dbo.fv_comfortscores_at_cursor(@asOf)` — the ml container is
        NOT involved. Returns 404 when no comfort rows exist at or
        before the cursor (e.g. before the first scheduled emission
        lands).
      operationId: getComfortCurrent
      tags: [comfort]
      responses:
        "200":
          description: Latest comfort row at the cursor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentComfortResponse"
        "404":
          description: No comfort rows visible at the cursor yet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  # -------------------------------------------------------------------
  # Readings — raw `SensorReadings` reads. Web tier only (read-path
  # bypasses ml). Slice 3 ships /latest; slice 4 (#6) adds /range and
  # /heatmap (this file).
  # -------------------------------------------------------------------
  /api/readings/latest:
    get:
      summary: Return the most recent `SensorReadings` row at the cursor.
      description: |
        Returns the row with the largest `ReadingTime` that is
        less-than-or-equal-to the current cursor. The web tier reads
        SQL Server directly — the ml container is NOT invoked. Under
        `WallClock` the cursor equals wall-clock UTC; under
        `ReplayClock` (slice 12) the cursor walks the data's time
        domain and this endpoint reflects the cursor's position.

        Returns 404 when `SensorReadings` is empty (e.g. bootstrap has
        not yet completed). The slice-3 bootstrap blocks readiness via
        `/api/health/ready` on the ml tier, so a healthy compose stack
        never serves 404 here.
      operationId: getReadingsLatest
      tags: [readings]
      responses:
        "200":
          description: Latest reading at the cursor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LatestReading"
        "404":
          description: SensorReadings is empty (bootstrap incomplete).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/readings/range:
    get:
      summary: Return time-bucketed (or raw) `SensorReadings` over `[start, end]`.
      description: |
        Bucket aggregation over `[start, end]` using SQL Server's
        `DATE_BUCKET` function. Cursor-clipped with
        `WHERE ReadingTime <= @asOf` so under `ReplayClock` (slice 12)
        the result reflects only what would have been visible at the
        cursor's position.

        `bucket` selects the aggregation granularity:

          * `raw`    — one row per `SensorReadings` row (no aggregation).
                       The web tier caps the *time span* a `raw` request
                       may cover (default: 7 days) to keep response
                       payloads bounded. Larger spans return 400 with
                       `range_too_large` and a suggested smaller bucket.
          * `hour`   — `DATE_BUCKET(HOUR, 1, ReadingTime)`.
          * `day`    — `DATE_BUCKET(DAY,  1, ReadingTime)`.
          * `week`   — `DATE_BUCKET(WEEK, 1, ReadingTime)`.

        For aggregated buckets, empty buckets are included with
        `sampleCount: 0` and `null` metric fields so the dashboard can
        render gaps.

        Returns 400 on `start > end`, an unknown `bucket` literal, or a
        `raw` request spanning more than `CLIMASENSE_RAW_MAX_DAYS`
        (default 7) days.
      operationId: getReadingsRange
      tags: [readings]
      parameters:
        - in: query
          name: start
          required: true
          schema:
            type: string
            format: date-time
          description: Inclusive lower bound (UTC ISO 8601).
        - in: query
          name: end
          required: true
          schema:
            type: string
            format: date-time
          description: Inclusive upper bound (UTC ISO 8601). Clipped at cursor.
        - in: query
          name: bucket
          required: false
          schema:
            $ref: "#/components/schemas/RangeBucket"
          description: Aggregation granularity. Default `hour`.
      responses:
        "200":
          description: Bucketed (or raw) readings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BucketedReadingsResponse"
        "400":
          description: Invalid range, bucket, or `raw` span too large.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/readings/heatmap:
    get:
      summary: Return per-day mean temperature for a calendar year.
      description: |
        Returns one cell per calendar day for the requested `year` — up
        to 366 rows. Aggregation uses `DATE_BUCKET(DAY, 1, ReadingTime)`.
        Days with zero samples are included with `sampleCount: 0` and
        `temperatureMean: null` so the dashboard can render a uniform
        GitHub-contribution-style grid.

        Cursor-clipped: under `ReplayClock` (slice 12) only readings
        with `ReadingTime <= cursor` count toward the means.

        `year` is constrained to 1900..2100 to keep the result-set size
        bounded and the input sanitised.
      operationId: getReadingsHeatmap
      tags: [readings]
      parameters:
        - in: query
          name: year
          required: true
          schema:
            type: integer
            minimum: 1900
            maximum: 2100
          description: Calendar year (UTC).
      responses:
        "200":
          description: Daily-mean cells for the requested year.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeatmapResponse"
        "400":
          description: Invalid year.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  # -------------------------------------------------------------------
  # Leaderboard — slice 6 read-path bypass. The web tier reads
  # `dbo.Leaderboard` directly. The ml tier owns *populating* the table
  # (via `LeaderboardSeeder` at FastAPI startup); the wire-shape lives
  # here so the .NET service and the Razor `Analysis` page share one
  # source of truth for column names.
  # -------------------------------------------------------------------
  /api/leaderboard:
    get:
      summary: Return all `dbo.Leaderboard` rows ordered by `mae` ascending.
      description: |
        Read-path bypass: the web tier executes
        `SELECT ModelName, Mae, Rmse, Mape, Smape, Provenance, EvaluatedAt
           FROM dbo.Leaderboard ORDER BY Mae ASC` and returns the rows
        verbatim in camelCase. The ml container is NOT involved.

        The table is populated at FastAPI startup by `LeaderboardSeeder`:
        notebook rows from `assets/results.json` carry
        `provenance: "notebook"`; one row produced by the boot-fitted
        `LagLinearForecaster` on the same 14-day held-out window carries
        `provenance: "live"`. Re-running the seeder produces zero net
        changes (idempotent MERGE keyed on `ModelName`).

        Empty `rows` is a valid 200 response (happens during the brief
        window between FastAPI lifespan start and `LeaderboardSeeder`
        completion). The ml-tier readiness gate prevents reviewers from
        seeing this in practice.
      operationId: getLeaderboard
      tags: [leaderboard]
      responses:
        "200":
          description: All leaderboard rows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"

  # -------------------------------------------------------------------
  # Alerts — slice 11. Two web-tier-only read endpoints back the Alert
  # history page and the toast handler. The threshold engine itself
  # runs inside the web tier as a `BackgroundService`
  # (`ThresholdAlertScanner`) — see ADR-0007 + epic #2's "Alert delivery
  # path" section.
  # -------------------------------------------------------------------
  /api/alerts:
    get:
      summary: Alert history (most-recent N) — cursor-clipped.
      description: |
        Returns the most-recent alerts visible at the cursor, ordered
        by `ReplayClockAtFire DESC, AlertId DESC`. Reads the
        `dbo.fv_alerts_at_cursor(@asOf)` TVF (init-db.sql §3.5) joined
        against `dbo.AlertRules` for the human-readable rule label and
        the `Metric Operator Threshold for DurationMinutes` summary.

        `limit` is clamped to `[1, 200]`; default 50. Returns 200 with
        an empty `rows` array when no alerts have fired yet.

        Read-path bypass — the ml container is NOT involved.
      operationId: getAlerts
      tags: [alerts]
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Maximum number of rows to return (1..200).
      responses:
        "200":
          description: Alert history envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertHistoryResponse"
        "400":
          description: Invalid `limit` (out of range or unparseable).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/alerts/rules:
    get:
      summary: List enabled alert rules.
      description: |
        Returns every enabled row in `dbo.AlertRules` ordered by
        `RuleId`. The dashboard uses this both as a "rules in force"
        inventory and as the lookup for the `breach-detected` toast
        when the SSE payload's `ruleId` arrives.

        CRUD UI is deferred (per ADR-0011 + epic #2 "Alerts and SSE");
        rules are seeded in `scripts/init-db.sql §5`.

        Read-path bypass — the ml container is NOT involved.
      operationId: getAlertRules
      tags: [alerts]
      responses:
        "200":
          description: All enabled rules.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertRulesResponse"

  # -------------------------------------------------------------------
  # SSE — registered on the web tier; documented here so the contract
  # captures the complete cross-tier wire surface.
  # -------------------------------------------------------------------
  /api/alerts/stream:
    get:
      summary: Server-Sent Events stream
      description: |
        SSE channel registered at slice 1 with two event types after
        slice 11:
          - `server-tick`       — heartbeat every ~15 s (slice 1).
          - `breach-detected`   — one per newly-inserted `dbo.Alerts`
            row (slice 11). Payload: `BreachDetectedPayload`. Fires
            from the `ThresholdAlertScanner` BackgroundService at
            wall-minute cadence.
        Slice 13 will add `clock-changed`.

        Subscribers are tracked in `AlertStream` (.NET singleton). Closing
        the connection unsubscribes cleanly via `HttpContext.RequestAborted`.
        `Last-Event-ID` reconnection is honoured; `breach-detected` events
        receive monotonically-increasing event ids on the same id space
        as `server-tick` so a reconnecting client never re-receives them.
      operationId: getAlertsStream
      tags: [sse]
      responses:
        "200":
          description: SSE stream opened.
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Each event is `event: <type>\ndata: <json>\nid: <number>\n\n`.
                  See `BreachDetectedPayload` for the slice-11 event body.

components:
  schemas:
    # -----------------------------------------------------------------
    # Health
    # -----------------------------------------------------------------
    Status:
      type: string
      enum: [ok, degraded, unavailable]
      description: Coarse-grained outcome of a health probe.

    Checks:
      type: string
      enum: [ok, fail, skipped]
      description: Per-dependency probe outcome.

    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, ts]
      properties:
        status:
          $ref: "#/components/schemas/Status"
        service:
          type: string
          description: Logical name of the responding service (e.g. `web`, `ml`).
          example: web
        ts:
          type: string
          format: date-time
          description: Server timestamp at which the probe was answered.
        checks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Checks"
          description: Per-dependency probe outcomes (db, ml, etc.).

    # -----------------------------------------------------------------
    # LatestReading — slice-3 read shape. The wire field names are
    # unit-tagged (`temperatureC`, `humidityPct`) so the dashboard's
    # JavaScript can render units without re-deriving them from headers.
    # The web tier's `SensorDataService.GetLatestAsync` returns this
    # shape directly from `SELECT TOP 1 … ORDER BY ReadingTime DESC`
    # clipped at the cursor (`WHERE ReadingTime <= @asOf`).
    # -----------------------------------------------------------------
    LatestReading:
      type: object
      additionalProperties: false
      required: [readingTime, temperatureC, humidityPct]
      properties:
        readingTime:
          type: string
          format: date-time
          description: Timestamp of the latest reading (UTC).
        temperatureC:
          type: number
          format: double
          description: Temperature in degrees Celsius.
          example: 21.5
        humidityPct:
          type: number
          format: double
          description: Relative humidity as a percentage (0–100).
          minimum: 0
          maximum: 100
          example: 47.0

    # -----------------------------------------------------------------
    # Range bucketing — slice 4. Controls `GET /api/readings/range`'s
    # aggregation granularity (mapped onto SQL Server's `DATE_BUCKET`
    # boundaries on the server side).
    # -----------------------------------------------------------------
    RangeBucket:
      type: string
      enum: [raw, hour, day, week]
      description: |
        Aggregation granularity for `/api/readings/range`.
          * `raw`  — un-aggregated rows (capped by `CLIMASENSE_RAW_MAX_DAYS`).
          * `hour` — `DATE_BUCKET(HOUR, 1, ReadingTime)`.
          * `day`  — `DATE_BUCKET(DAY, 1, ReadingTime)`.
          * `week` — `DATE_BUCKET(WEEK, 1, ReadingTime)`.

    BucketedReading:
      type: object
      additionalProperties: false
      required: [bucketTime, sampleCount]
      properties:
        bucketTime:
          type: string
          format: date-time
          description: |
            Bucket start (UTC). For `raw`, this is the row's `ReadingTime`;
            for aggregated buckets, the `DATE_BUCKET` boundary.
        sampleCount:
          type: integer
          minimum: 0
          description: |
            Count of `SensorReadings` rows that fell into the bucket.
            `0` for empty aggregated buckets (metric fields are then `null`).
        temperatureMean:
          type: number
          format: double
          nullable: true
          description: |
            Mean temperature (°C) over the bucket. `null` when
            `sampleCount` is 0. For `raw`, equals the row's temperature.
        temperatureMin:
          type: number
          format: double
          nullable: true
          description: Min temperature (°C). `null` when `sampleCount` is 0.
        temperatureMax:
          type: number
          format: double
          nullable: true
          description: Max temperature (°C). `null` when `sampleCount` is 0.
        humidityMean:
          type: number
          format: double
          nullable: true
          description: Mean humidity (% RH). `null` when `sampleCount` is 0.
        humidityMin:
          type: number
          format: double
          nullable: true
          description: Min humidity. `null` when `sampleCount` is 0.
        humidityMax:
          type: number
          format: double
          nullable: true
          description: Max humidity. `null` when `sampleCount` is 0.

    BucketedReadingsResponse:
      type: object
      additionalProperties: false
      required: [start, end, bucket, buckets]
      properties:
        start:
          type: string
          format: date-time
          description: Echo of the requested window start (clipped at cursor).
        end:
          type: string
          format: date-time
          description: Echo of the requested window end (clipped at cursor).
        bucket:
          $ref: "#/components/schemas/RangeBucket"
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/BucketedReading"

    HeatmapCell:
      type: object
      additionalProperties: false
      required: [date, sampleCount]
      properties:
        date:
          type: string
          format: date
          description: Calendar day (UTC, ISO 8601 `YYYY-MM-DD`).
        sampleCount:
          type: integer
          minimum: 0
          description: Count of readings on this day (0 if no data).
        temperatureMean:
          type: number
          format: double
          nullable: true
          description: |
            Daily mean temperature (°C). `null` when `sampleCount` is 0.

    HeatmapResponse:
      type: object
      additionalProperties: false
      required: [year, cells]
      properties:
        year:
          type: integer
          minimum: 1900
          maximum: 2100
          description: Echo of the requested year.
        cells:
          type: array
          description: |
            One cell per calendar day in `year`. Length is 365 or 366
            depending on leap-year status.
          items:
            $ref: "#/components/schemas/HeatmapCell"

    # -----------------------------------------------------------------
    # ProblemDetails — RFC 7807-shaped error body used uniformly across
    # 501 / 502 / 503 / 504 responses. Kept narrower than the RFC so
    # codegen produces compact, predictable DTOs.
    # -----------------------------------------------------------------
    ProblemDetails:
      type: object
      additionalProperties: false
      required: [error, message]
      properties:
        error:
          type: string
          description: Machine-readable error slug (snake_case).
          example: ml_service_unavailable
        message:
          type: string
          description: Human-readable explanation suitable for the browser.
        requestId:
          type: string
          description: Echo of the inbound `X-Request-ID` header for correlation.

    # -----------------------------------------------------------------
    # Forecast
    # -----------------------------------------------------------------
    ForecastRequest:
      type: object
      additionalProperties: false
      required: [horizonHours]
      properties:
        horizonHours:
          type: integer
          minimum: 1
          maximum: 168
          description: Forecast horizon in hours (1–168).
          example: 72

    ForecastPoint:
      type: object
      additionalProperties: false
      required:
        [
          targetTime,
          predictedTemperature,
          predictedHumidity,
          confidenceLowerTemp,
          confidenceUpperTemp,
        ]
      properties:
        targetTime:
          type: string
          format: date-time
          description: Wall-clock time the prediction targets.
        predictedTemperature:
          type: number
          format: double
          description: Predicted air temperature in °C.
        predictedHumidity:
          type: number
          format: double
          description: Predicted relative humidity in %.
        confidenceLowerTemp:
          type: number
          format: double
          description: Lower bound of the 95 % temperature CI.
        confidenceUpperTemp:
          type: number
          format: double
          description: Upper bound of the 95 % temperature CI.

    ForecastEnvelope:
      type: object
      additionalProperties: false
      required: [generatedAt, modelVersion, horizonHours, points]
      properties:
        generatedAt:
          type: string
          format: date-time
          description: Cursor value at the moment the forecast was emitted.
        modelVersion:
          type: string
          description: Identifier of the boot-fitted lag-LR artefact.
          example: lag-lr-v1
        horizonHours:
          type: integer
          minimum: 1
          maximum: 168
        points:
          type: array
          items:
            $ref: "#/components/schemas/ForecastPoint"

    # -----------------------------------------------------------------
    # Anomalies
    # -----------------------------------------------------------------
    AnomalyType:
      type: string
      enum: [sensor_failure, regime_shift, residual_outlier]
      description: |
        The detector that flagged a row. `sensor_failure` and
        `residual_outlier` are point-in-time; `regime_shift` is a
        90-day scan-and-replace.

    AnomalyDetectRequest:
      type: object
      additionalProperties: false
      required: [types]
      properties:
        types:
          type: array
          items:
            $ref: "#/components/schemas/AnomalyType"
          minItems: 1
          description: Which detectors to run.
        startDate:
          type: string
          format: date-time
          description: |
            Window start (inclusive). Optional — defaults are detector-specific
            (24 h for point-in-time, 90 d for changepoint).
        endDate:
          type: string
          format: date-time
          description: Window end (inclusive). Optional — defaults to the cursor.

    AnomalyRow:
      type: object
      additionalProperties: false
      required: [anomalyType, readingTime, severity]
      properties:
        anomalyType:
          $ref: "#/components/schemas/AnomalyType"
        readingTime:
          type: string
          format: date-time
        severity:
          type: number
          format: double
          description: |
            For `residual_outlier`: |residual| / rolling σ.
            For the other detectors: 1.0 (binary).
        description:
          type: string
          description: Short free-text description (e.g. `"gap > 10 min"`).

    AnomalyDetectResponse:
      type: object
      additionalProperties: false
      required: [inserted, totalScanned, rows, perType]
      properties:
        inserted:
          type: integer
          description: |
            Total count of new rows committed (idempotent — duplicates
            are 0). For `regime_shift` this is the post-replace row
            count (scan-and-replace produces a stable rowset, not net
            inserts).
        totalScanned:
          type: integer
          description: Count of readings scanned by the detectors.
        perType:
          $ref: "#/components/schemas/AnomalyRunSummary"
        rows:
          type: array
          items:
            $ref: "#/components/schemas/AnomalyRow"

    # Per-type breakdown returned by the orchestrator. Mirrors the
    # `AnomalyRunSummary` dataclass on the ml tier so the wire shape
    # is what the orchestrator returns verbatim.
    AnomalyRunSummary:
      type: object
      additionalProperties: false
      required: [sensorFailure, residualOutlier, regimeShift]
      properties:
        sensorFailure:
          type: integer
          description: Newly-inserted `sensor_failure` rows in the 24h scan window.
        residualOutlier:
          type: integer
          description: Newly-inserted `residual_outlier` rows in the 24h scan window.
        regimeShift:
          type: integer
          description: |
            Post-replace `regime_shift` row count in the 90d scan
            window. Scan-and-replace means this is the row count
            *after* the transaction commits, not the net insert count.

    # -----------------------------------------------------------------
    # Profiles
    # -----------------------------------------------------------------
    ProfilesAnalyzeRequest:
      type: object
      additionalProperties: false
      required: [startDate, endDate]
      properties:
        startDate:
          type: string
          format: date
          description: Window start (UTC date, inclusive).
        endDate:
          type: string
          format: date
          description: Window end (UTC date, inclusive).

    Pattern:
      type: string
      enum: [quiet, warm, cool, volatile]
      description: |
        Derived `DayProfile` label. Precedence (per `init-db.sql.fn_classify_pattern`):
        `volatile > warm > cool > quiet`.

    DayProfileRow:
      type: object
      additionalProperties: false
      required: [date, dayOfWeek, meanResidual, maxAbsZscore, pattern]
      properties:
        date:
          type: string
          format: date
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
          description: 0 = Monday, 6 = Sunday (ISO 8601 weekday).
        meanResidual:
          type: number
          format: double
          description: Mean of standardised residuals for the day.
        maxAbsZscore:
          type: number
          format: double
          description: Largest absolute z-score for the day.
        pattern:
          $ref: "#/components/schemas/Pattern"

    ProfilesAnalyzeResponse:
      type: object
      additionalProperties: false
      required: [rowsReplaced, rows]
      properties:
        rowsReplaced:
          type: integer
          description: Count of `DayProfiles` rows replaced in this run.
        rows:
          type: array
          items:
            $ref: "#/components/schemas/DayProfileRow"

    # -----------------------------------------------------------------
    # DayProfilesResponse — slice 9 web-tier read shape. Returned by
    # `GET /api/profiles?start=&end=`. Carries N rows in `Date ASC`
    # order plus the resolved window so the caller can confirm what
    # server-side defaults filled in.
    # -----------------------------------------------------------------
    DayProfileRowWithComputedAt:
      type: object
      additionalProperties: false
      required: [date, dayOfWeek, meanResidual, maxAbsZscore, pattern, computedAt]
      properties:
        date:
          type: string
          format: date
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
          description: 0 = Monday, 6 = Sunday (ISO 8601 weekday).
        meanResidual:
          type: number
          format: double
          description: Mean of standardised residuals for the day.
        maxAbsZscore:
          type: number
          format: double
          description: Largest absolute z-score for the day.
        pattern:
          $ref: "#/components/schemas/Pattern"
        computedAt:
          type: string
          format: date-time
          description: When the row was written into `DayProfiles` (UTC).

    DayProfilesResponse:
      type: object
      additionalProperties: false
      required: [start, end, rows]
      properties:
        start:
          type: string
          format: date
          description: |
            Resolved window start (inclusive, UTC date). Equals the
            query `start` when provided; otherwise `end - 30 days`.
        end:
          type: string
          format: date
          description: |
            Resolved window end (inclusive, UTC date). Equals the
            query `end` when provided; otherwise the cursor's
            calendar date.
        rows:
          type: array
          items:
            $ref: "#/components/schemas/DayProfileRowWithComputedAt"

    # -----------------------------------------------------------------
    # Comfort
    # -----------------------------------------------------------------
    ComfortSeason:
      type: string
      enum: [summer, winter]
      description: Selected by calendar month + `COMFORT_HEMISPHERE` env var.

    ComfortRating:
      type: string
      enum: [excellent, acceptable, marginal, uncomfortable]
      description: Qualitative bucket derived from `score`.

    ComfortScoreResponse:
      type: object
      additionalProperties: false
      required: [score, rating, season, bucketTime]
      properties:
        score:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: |
            100 inside the ASHRAE 55 polygon for the selected season;
            `max(0, 100 - α · d_polygon)` outside.
        rating:
          $ref: "#/components/schemas/ComfortRating"
        season:
          $ref: "#/components/schemas/ComfortSeason"
        bucketTime:
          type: string
          format: date-time
          description: Cursor value the score was computed at.
        averageTemperature:
          type: number
          format: double
          description: Mean of the trailing-window air temperature in °C.
        averageHumidity:
          type: number
          format: double
          description: Mean of the trailing-window relative humidity in %.

    # -----------------------------------------------------------------
    # CurrentComfortResponse — slice 7 web-tier read shape. Returned by
    # `GET /api/comfort/current` (the dashboard's comfort card). Reads
    # the most recent `dbo.ComfortScores` row at the cursor; does NOT
    # carry the `averageTemperature` / `averageHumidity` fields since
    # those are only available on the emission path (the on-demand
    # `GET /api/comfort/score`) where the means are computed.
    # -----------------------------------------------------------------
    CurrentComfortResponse:
      type: object
      additionalProperties: false
      required: [score, rating, season, bucketTime, computedAt]
      properties:
        score:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Most recent comfort score (0–100).
        rating:
          $ref: "#/components/schemas/ComfortRating"
        season:
          $ref: "#/components/schemas/ComfortSeason"
        bucketTime:
          type: string
          format: date-time
          description: The `BucketTime` the row was scored for (UTC).
        computedAt:
          type: string
          format: date-time
          description: When the row was written into `ComfortScores` (UTC).

    # -----------------------------------------------------------------
    # Comfort Budget — slice 10 web-tier read shape. Returned by
    # `GET /api/comfort/budget`. Three pure SQL aggregations packaged
    # into one payload so the dashboard panel hydrates from a single
    # request. Per ADR-0006 this replaces the dropped "recommendations
    # engine" with deterministic facts over the cursor-clipped tables.
    # -----------------------------------------------------------------
    WorstCalendarCell:
      type: object
      additionalProperties: false
      required: [date, dayOfWeek, meanResidual, maxAbsZscore, pattern]
      properties:
        date:
          type: string
          format: date
          description: Calendar day of the worst cell (UTC).
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
          description: 0 = Monday, 6 = Sunday (ISO 8601 weekday).
        meanResidual:
          type: number
          format: double
          description: |
            Mean of standardised residuals for the day. Most-negative
            wins (the "coldest" cell). Tie-breaker: most-recent date.
        maxAbsZscore:
          type: number
          format: double
          description: Largest absolute z-score for the day.
        pattern:
          $ref: "#/components/schemas/Pattern"

    ComfortTrendPoint:
      type: object
      additionalProperties: false
      required: [day, minScore, maxScore, meanScore, sampleCount]
      properties:
        day:
          type: string
          format: date
          description: |
            Calendar day of the bucket (UTC). One row per day where
            `dbo.ComfortScores` has at least one row in the window.
        minScore:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Day's minimum `Score`.
        maxScore:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Day's maximum `Score`.
        meanScore:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Day's mean `Score` (sparkline value).
        sampleCount:
          type: integer
          minimum: 1
          description: Number of `dbo.ComfortScores` rows in the bucket.

    ComfortBudgetResponse:
      type: object
      additionalProperties: false
      required:
        - hoursOutsideZone
        - threshold
        - windowDays
        - windowStart
        - windowEnd
        - trend
      properties:
        hoursOutsideZone:
          type: integer
          minimum: 0
          description: |
            Count of `dbo.ComfortScores` rows in the window whose
            `Score` is strictly less than `threshold`.
        threshold:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: |
            Discomfort threshold used to evaluate `hoursOutsideZone`.
            Sourced from `COMFORT_DISCOMFORT_THRESHOLD` env var
            (default 70). Surfaced so the dashboard can label the
            "<threshold" without a round-trip to the config.
        windowDays:
          type: integer
          minimum: 1
          maximum: 366
          description: |
            Width of the window in days. Sourced from
            `COMFORT_BUDGET_WINDOW_DAYS` (default 7).
        windowStart:
          type: string
          format: date-time
          description: |
            UTC datetime — inclusive lower bound of the window
            (`cursor - windowDays`).
        windowEnd:
          type: string
          format: date-time
          description: UTC datetime — equals the cursor's `asOf`.
        worstCell:
          $ref: "#/components/schemas/WorstCalendarCell"
          nullable: true
        trend:
          type: array
          items:
            $ref: "#/components/schemas/ComfortTrendPoint"

    # -----------------------------------------------------------------
    # LatestAnomalyResponse — slice 8 web-tier read shape. Returned by
    # `GET /api/anomalies/latest` (the dashboard's "Last anomaly"
    # card). One row, the most recent `dbo.Anomalies` row visible at
    # the cursor (largest `DetectedAt`). All four columns surfaced so
    # the dashboard pill, severity, and tooltip can render off a
    # single fetch.
    # -----------------------------------------------------------------
    LatestAnomalyResponse:
      type: object
      additionalProperties: false
      required: [anomalyType, readingTime, severity, detectedAt]
      properties:
        anomalyType:
          $ref: "#/components/schemas/AnomalyType"
        readingTime:
          type: string
          format: date-time
          description: The `ReadingTime` the anomaly was flagged for (UTC).
        severity:
          type: number
          format: double
          description: |
            For `residual_outlier`: |residual| / rolling σ. For the
            other two detectors: 1.0 (binary).
        description:
          type: string
          description: |
            Optional short free-text description (e.g. `"gap > 10 min"`
            for `sensor_failure`, `"PELT changepoint detected"` for
            `regime_shift`).
        detectedAt:
          type: string
          format: date-time
          description: When the detector wrote the row (UTC).

    # -----------------------------------------------------------------
    # AnomaliesResponse — slice 8 web-tier read shape. Returned by
    # `GET /api/anomalies?start=&end=&type=`. Carries N rows in
    # `ReadingTime DESC` order plus the resolved window so the caller
    # can confirm what server-side defaults filled in.
    # -----------------------------------------------------------------
    AnomaliesResponse:
      type: object
      additionalProperties: false
      required: [start, end, rows]
      properties:
        start:
          type: string
          format: date-time
          description: |
            Resolved window start (inclusive, UTC). Equals the query
            `start` when provided; otherwise `end - 24h`.
        end:
          type: string
          format: date-time
          description: |
            Resolved window end (inclusive, UTC). Equals the query
            `end` when provided; otherwise the cursor.
        type:
          $ref: "#/components/schemas/AnomalyType"
        rows:
          type: array
          items:
            $ref: "#/components/schemas/LatestAnomalyResponse"

    # -----------------------------------------------------------------
    # Leaderboard — slice 6. `provenance` distinguishes notebook rows
    # (copied from `assets/results.json`) from the one boot-fitted live
    # row (`LagLinearForecaster` evaluated on the same held-out window).
    # -----------------------------------------------------------------
    Provenance:
      type: string
      enum: [notebook, live]
      description: |
        Origin of a leaderboard row.
          * `notebook` — copied from `assets/results.json`.
          * `live`     — computed at FastAPI startup by the boot-fitted
                         `LagLinearForecaster` on the same 14-day
                         held-out window.

    LeaderboardRow:
      type: object
      additionalProperties: false
      required: [modelName, mae, rmse, provenance, evaluatedAt]
      properties:
        modelName:
          type: string
          description: |
            Display name. Notebook rows preserve their printed labels
            (e.g. `Naive (last value)`, `Holt-Winters (add, m=24)`,
            `SARIMA(1,0,1)(1,0,1,24)`); the live row carries the
            forecaster's `model_version` (e.g. `lag-lr-v1`).
        mae:
          type: number
          format: double
          minimum: 0
          description: Mean absolute error on the 14-day held-out window.
        rmse:
          type: number
          format: double
          minimum: 0
          description: Root mean squared error on the 14-day held-out window.
        mape:
          type: number
          format: double
          nullable: true
          description: |
            Mean absolute percentage error. `null` for rows whose
            source did not report MAPE.
        smape:
          type: number
          format: double
          nullable: true
          description: |
            Symmetric mean absolute percentage error. `null` for rows
            whose source did not report sMAPE.
        provenance:
          $ref: "#/components/schemas/Provenance"
        evaluatedAt:
          type: string
          format: date-time
          description: |
            UTC timestamp at which the row was persisted. Notebook rows
            carry the seeder run-time (re-MERGE refreshes it); the live
            row carries the boot-fit completion time.

    LeaderboardResponse:
      type: object
      additionalProperties: false
      required: [rows]
      properties:
        rows:
          type: array
          description: |
            All rows in `dbo.Leaderboard`, ordered by `mae` ascending.
            Empty during the brief lifespan window before
            `LeaderboardSeeder` completes.
          items:
            $ref: "#/components/schemas/LeaderboardRow"

    # -----------------------------------------------------------------
    # Alerts — slice 11. The threshold engine writes rows into
    # `dbo.Alerts`; the web tier reads them via the cursor-clipped TVF
    # `dbo.fv_alerts_at_cursor(@asOf)`. Rules live in `dbo.AlertRules`
    # (seeded in init-db.sql §5; CRUD UI deferred per ADR-0011).
    # -----------------------------------------------------------------
    AlertMetric:
      type: string
      enum: [T, RH]
      description: |
        Metric column the rule predicate compares against.
          * `T`  → `dbo.SensorReadings.Temperature` (°C).
          * `RH` → `dbo.SensorReadings.Humidity`   (% relative).

    AlertOperator:
      type: string
      enum: [">", "<"]
      description: |
        Comparison operator for the rule predicate. The current set is
        deliberately small (`>` and `<`) — the threshold engine's
        gaps-and-islands SQL renders this directly into the
        `CASE WHEN <col> <op> @threshold THEN 1 ELSE 0 END` predicate.

    AlertRow:
      type: object
      additionalProperties: false
      required:
        - alertId
        - ruleId
        - ruleName
        - ruleSummary
        - breachStart
        - breachEnd
        - peakValue
        - replayClockAtFire
      properties:
        alertId:
          type: integer
          format: int64
          description: Identity column from `dbo.Alerts`.
        ruleId:
          type: integer
          description: Identity column from `dbo.AlertRules`.
        ruleName:
          type: string
          description: Human-curated name from `dbo.AlertRules.Name`.
        ruleSummary:
          type: string
          description: |
            One-line, human-readable rendering of the rule's predicate,
            e.g. `"T > 26 °C for 30 min"`. Computed on the server so
            the dashboard never has to second-hop for it.
        breachStart:
          type: string
          format: date-time
          description: Earliest in-breach reading time (UTC).
        breachEnd:
          type: string
          format: date-time
          description: Latest in-breach reading time (UTC).
        peakValue:
          type: number
          format: double
          description: |
            Extreme value of the metric inside the breach window
            (`MAX` for `>` rules, `MIN` for `<` rules).
        replayClockAtFire:
          type: string
          format: date-time
          description: |
            Cursor value at the moment the scanner committed the row —
            makes the clock-source explicit on every Alert.

    AlertHistoryResponse:
      type: object
      additionalProperties: false
      required: [limit, count, rows]
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 200
          description: |
            Effective row cap the server applied (clamped to
            `[1, 200]`; default 50). Echoes the query parameter when
            provided.
        count:
          type: integer
          minimum: 0
          description: Number of rows in this response page.
        rows:
          type: array
          description: |
            Up to `limit` most-recent alerts visible at the cursor,
            ordered by `replayClockAtFire DESC, alertId DESC`.
          items:
            $ref: "#/components/schemas/AlertRow"

    AlertRuleRow:
      type: object
      additionalProperties: false
      required:
        - ruleId
        - name
        - metric
        - operator
        - threshold
        - durationMinutes
        - enabled
        - summary
      properties:
        ruleId:
          type: integer
          description: Identity column from `dbo.AlertRules`.
        name:
          type: string
          description: Human-curated name.
        metric:
          $ref: "#/components/schemas/AlertMetric"
        operator:
          $ref: "#/components/schemas/AlertOperator"
        threshold:
          type: number
          format: double
          description: Comparison value (units match `metric`).
        durationMinutes:
          type: integer
          minimum: 1
          description: |
            Minimum sustained duration before the breach interval
            counts as closed (and is therefore eligible for an Alert
            row).
        enabled:
          type: boolean
          description: |
            `true` when the scanner evaluates the rule each tick.
            `GET /api/alerts/rules` returns only enabled rows.
        summary:
          type: string
          description: |
            One-line, human-readable rendering of the rule's predicate
            (e.g. `"T > 26 °C for 30 min"`).

    AlertRulesResponse:
      type: object
      additionalProperties: false
      required: [rules]
      properties:
        rules:
          type: array
          description: All enabled rules, ordered by `ruleId`.
          items:
            $ref: "#/components/schemas/AlertRuleRow"

    BreachDetectedPayload:
      type: object
      additionalProperties: false
      description: |
        JSON payload of the SSE `event: breach-detected` frame. Emitted
        from `ThresholdAlertScanner.TickOnceAsync` once per newly-inserted
        `dbo.Alerts` row. Idempotent on `UNIQUE(RuleId, BreachStart)` —
        re-detections produce zero events.
      required:
        - alertId
        - ruleId
        - ruleName
        - ruleSummary
        - breachStart
        - breachEnd
        - peakValue
        - replayClockAtFire
      properties:
        alertId:
          type: integer
          format: int64
        ruleId:
          type: integer
        ruleName:
          type: string
        ruleSummary:
          type: string
        breachStart:
          type: string
          format: date-time
        breachEnd:
          type: string
          format: date-time
        peakValue:
          type: number
          format: double
        replayClockAtFire:
          type: string
          format: date-time
