# ClimaSense — three-tier compose stack (Slice 3: bcp bootstrap).
#
# - `db`:  SQL Server 2022. Network-internal only. `init-db.sql` is applied
#          idempotently by an init-runner sidecar.
# - `ml`:  FastAPI tier. Network-internal only. Owns CSV bootstrap (via
#          bcp on first boot) + the slice-2 stubs. `/api/health/ready`
#          gates on bootstrap completion so dependents don't see an
#          empty `SensorReadings` table.
# - `web`: ASP.NET Core tier. Published on 127.0.0.1:8080 ONLY.
#          Slice 3 ships the latest-reading dashboard widget at /;
#          subsequent slices replace it with the full dashboard.
#
# Per issue #3 the host port-map is intentionally narrow: do NOT publish 1433
# or any ml port. Reviewers reach the system through web only.
#
# Slice 3 additions:
#   * `sensor_data.csv` is bind-mounted INTO the `ml` container so
#     `IngestionService.bootstrap_from_csv_if_empty()` can stream it
#     through pandas, write `/tmp/seed.csv`, and shell out to `bcp`
#     for a ~30-90 s bulk load (2.45 M deduped rows).
#   * The `ml` healthcheck `start_period` was already 300 s in slice 1;
#     it tolerates the bootstrap window comfortably.

name: climasense

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: climasense-db
    env_file:
      - .env
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    # No `ports:` — db is network-internal.
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      # `mssql-tools18` ships at this path on the 2022-latest image.
      test:
        - "CMD-SHELL"
        - "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -No -Q 'SELECT 1' || exit 1"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - climasense-net

  db-init:
    # One-shot sidecar that applies `init-db.sql` idempotently after `db`
    # reaches `healthy`. Exits 0 when done; compose treats `service_completed_successfully`
    # as the gate for `ml` and `web`.
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: climasense-db-init
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    entrypoint:
      - "/opt/mssql-tools18/bin/sqlcmd"
      - "-S"
      - "db,1433"
      - "-U"
      - "sa"
      - "-P"
      - "${MSSQL_SA_PASSWORD}"
      - "-No"
      - "-b"
      - "-i"
      - "/scripts/init-db.sql"
    networks:
      - climasense-net
    restart: "no"

  ml:
    build:
      # The build context is the repo root so the Dockerfile can COPY
      # `contracts/openapi.yaml` for codegen + `ContractValidator`.
      context: .
      dockerfile: src/ClimaSense.ML/Dockerfile
    container_name: climasense-ml
    env_file:
      - .env
    environment:
      CLIMASENSE_DB_HOST: db
      CLIMASENSE_DB_PORT: "1433"
      CLIMASENSE_DB_NAME: "${CLIMASENSE_DB_NAME}"
      CLIMASENSE_DB_USER: sa
      CLIMASENSE_DB_PASSWORD: "${MSSQL_SA_PASSWORD}"
      LOG_LEVEL: "${PYTHON_LOG_LEVEL}"
      # Slice 3: the bootstrap reads `sensor_data.csv` from the
      # bind-mount below and writes the transformed seed to /tmp.
      CLIMASENSE_BOOTSTRAP_CSV: "/data/sensor_data.csv"
      CLIMASENSE_SEED_CSV: "/tmp/seed.csv"
    volumes:
      # Read-only bind mount of the bundled CSV. The repo-root file is
      # 116 MB and is .gitignored; reviewers fetch it separately per the
      # README. The mount is read-only because the bootstrap only ever
      # streams the file through pandas.
      - ./sensor_data.csv:/data/sensor_data.csv:ro
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    # No `ports:` — ml is network-internal. .NET reaches it via http://ml:8000.
    healthcheck:
      # Slice 3: /api/health/ready returns 503 with bootstrap=in_progress
      # while bcp runs, then flips to 200 with bootstrap=complete. The
      # 300 s start_period from slice 1 covers the 30-90 s bootstrap
      # comfortably with retries in reserve.
      test:
        - "CMD-SHELL"
        - "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8000/api/health/ready\", timeout=3).status==200 else 1)'"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 300s
    networks:
      - climasense-net

  web:
    build:
      context: ./src/ClimaSense.Web
    container_name: climasense-web
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      CLIMASENSE_DB_HOST: db
      CLIMASENSE_DB_PORT: "1433"
      CLIMASENSE_DB_NAME: "${CLIMASENSE_DB_NAME}"
      CLIMASENSE_DB_USER: sa
      CLIMASENSE_DB_PASSWORD: "${MSSQL_SA_PASSWORD}"
      CLIMASENSE_ML_BASE_URL: "http://ml:8000"
      # Slice 10: Comfort Budget panel — threshold + window read once at
      # startup, used by `ComfortBudgetReadService`. Defaults match
      # ADR-0006 + the #2 epic (70 / 7).
      COMFORT_DISCOMFORT_THRESHOLD: "${COMFORT_DISCOMFORT_THRESHOLD:-70}"
      COMFORT_BUDGET_WINDOW_DAYS: "${COMFORT_BUDGET_WINDOW_DAYS:-7}"
      Logging__LogLevel__Default: "${LOG_LEVEL}"
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      ml:
        condition: service_healthy
    ports:
      # Localhost-only publication per ADR (single-user demo posture).
      - "127.0.0.1:8080:8080"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -fsS http://localhost:8080/api/health/ready || exit 1"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 300s
    networks:
      - climasense-net

networks:
  climasense-net:
    name: climasense-net
    driver: bridge

volumes:
  mssql-data:
    name: climasense-mssql-data
